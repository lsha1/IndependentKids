/* Independent Kids and Adults — homepage styles
   Brand: green #19A610 + purple #922A82 (lifted from logo)
   Type: Manrope (UI) + Source Serif 4 (display headlines) — both Google Fonts, friendly + qualified
*/

:root {
  --green-700: #0f7a09;
  --green-600: #19A610;
  --green-500: #2bb721;
  --green-100: #e8f7e6;
  --green-50:  #f3fbf2;

  --purple-800: #6e1f63;
  --purple-700: #922A82;
  --purple-600: #a93a98;
  --purple-100: #f5e8f3;
  --purple-50:  #faf3f8;

  --ink-900: #1c1a23;
  --ink-700: #3a3742;
  --ink-500: #6a6772;
  --ink-300: #b9b6c0;
  --ink-100: #ecebef;

  --bg:       #fbfaf7;
  --paper:    #ffffff;
  --line:     rgba(28,26,35,0.10);

  --primary: var(--green-600);
  --primary-ink: var(--green-700);
  --secondary: var(--purple-700);
  --secondary-ink: var(--purple-800);

  --r-sm: 8px;
  --r-md: 14px;
  --r-lg: 22px;
  --r-xl: 28px;

  --shadow-sm: 0 1px 2px rgba(28,26,35,0.06), 0 2px 6px rgba(28,26,35,0.04);
  --shadow-md: 0 4px 14px rgba(28,26,35,0.08), 0 12px 28px rgba(28,26,35,0.06);
  --shadow-lg: 0 12px 30px rgba(28,26,35,0.10), 0 24px 60px rgba(28,26,35,0.08);

  --maxw: 1200px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Manrope', system-ui, -apple-system, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--ink-900);
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
h1, h2, h3, h4 {
  font-family: 'Source Serif 4', 'Source Serif Pro', Georgia, serif;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin: 0;
  color: var(--ink-900);
  text-wrap: pretty;
}
h1 { font-size: clamp(40px, 5vw, 64px); line-height: 1.05; letter-spacing: -0.022em; }
h2 { font-size: clamp(28px, 3.2vw, 42px); line-height: 1.12; }
h3 { font-size: 20px; line-height: 1.3; }
p { margin: 0; }
a { color: inherit; text-decoration: none; }

/* ---------- Buttons ---------- */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 18px;
  border-radius: 999px;
  font-weight: 600;
  font-size: 15px;
  border: 1.5px solid transparent;
  cursor: pointer;
  transition: transform .12s ease, box-shadow .18s ease, background .18s ease, border-color .18s ease, color .18s ease;
  text-decoration: none;
  white-space: nowrap;
  font-family: inherit;
}
.btn-sm  { padding: 8px 14px;  font-size: 14px; }
.btn-lg  { padding: 14px 22px; font-size: 16px; }
.btn-block { width: 100%; justify-content: center; }
.btn-primary {
  background: var(--primary);
  color: #fff;
  box-shadow: 0 6px 16px rgba(25,166,16,0.22), inset 0 -2px 0 rgba(0,0,0,0.10);
}
.btn-primary:hover { background: var(--green-700); transform: translateY(-1px); }
.btn-ghost {
  background: transparent;
  color: var(--ink-900);
  border-color: var(--line);
}
.btn-ghost:hover { border-color: var(--ink-900); background: rgba(0,0,0,0.02); }
.accent-purple .btn-primary { background: var(--secondary); box-shadow: 0 6px 16px rgba(146,42,130,0.22), inset 0 -2px 0 rgba(0,0,0,0.10); }
.accent-purple .btn-primary:hover { background: var(--purple-800); }
.accent-duo .btn-primary { background: linear-gradient(135deg, var(--green-600), var(--purple-700)); }

/* ---------- Top bar ---------- */
.topbar {
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; gap: 24px;
  padding: 14px clamp(18px, 4vw, 40px);
  background: rgba(251,250,247,0.85);
  backdrop-filter: saturate(180%) blur(12px);
  -webkit-backdrop-filter: saturate(180%) blur(12px);
  border-bottom: 1px solid var(--line);
}
.brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.brand img { height: 44px; width: auto; }
.brand-text { display: flex; flex-direction: column; line-height: 1.05; }
.brand-text strong { font-size: 15px; color: var(--secondary-ink); font-weight: 700; letter-spacing: -0.01em; }
.brand-text em { font-style: normal; font-size: 12px; color: var(--ink-500); }
.topnav { display: flex; gap: 22px; margin-left: 8px; }
.topnav a { font-size: 14.5px; color: var(--ink-700); font-weight: 500; padding: 6px 0; border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; }
.topnav a:hover { color: var(--secondary-ink); border-bottom-color: var(--secondary); }
.topcta { margin-left: auto; display: flex; align-items: center; gap: 14px; }
.phone-link { display: inline-flex; align-items: center; gap: 8px; font-size: 14.5px; color: var(--ink-900); font-weight: 600; }
.phone-link:hover { color: var(--primary-ink); }
@media (max-width: 900px) {
  .topnav { display: none; }
  .phone-link span { display: none; }
}

/* ---------- Hero ---------- */
.hero { padding: clamp(48px, 8vw, 96px) clamp(18px, 4vw, 40px) clamp(40px, 6vw, 80px); position: relative; overflow: hidden; }
.hero::before {
  content: "";
  position: absolute; inset: 0;
  background:
    radial-gradient(60% 70% at 90% 10%, rgba(146,42,130,0.06), transparent 60%),
    radial-gradient(60% 80% at 5% 90%, rgba(25,166,16,0.07), transparent 60%);
  pointer-events: none;
}
.hero-inner {
  position: relative;
  max-width: var(--maxw); margin: 0 auto;
  display: grid; grid-template-columns: 1.1fr 1fr; gap: clamp(32px, 6vw, 72px); align-items: center;
}
.hero-stacked .hero-inner { grid-template-columns: 1fr; max-width: 800px; }
.hero-centered .hero-inner { grid-template-columns: 1fr; text-align: center; max-width: 880px; }
.hero-centered .hero-actions, .hero-centered .hero-bullets, .hero-centered .eyebrow { justify-content: center; }
.hero-centered .hero-bullets { justify-content: center; }
.hero-centered .hero-visual { display: none; }
.hero-stacked .hero-visual {
  margin-top: 24px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: stretch;
}
.hero-stacked .hero-photo-main { aspect-ratio: 4/3; }
.hero-stacked .hero-photo-sm { aspect-ratio: 4/3; }
.hero-stacked .hero-badge { display: none; }

.eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 13px; font-weight: 600;
  color: var(--secondary-ink);
  background: var(--purple-50);
  border: 1px solid rgba(146,42,130,0.15);
  padding: 6px 12px;
  border-radius: 999px;
  margin-bottom: 20px;
}
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dot-green { background: var(--primary); box-shadow: 0 0 0 3px rgba(25,166,16,0.18); }

.hero h1 { margin-bottom: 18px; }
.lede { font-size: clamp(17px, 1.4vw, 19px); color: var(--ink-700); max-width: 56ch; margin-bottom: 28px; line-height: 1.5; }
.hero-actions { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 28px; }
.hero-bullets {
  list-style: none; padding: 0; margin: 0;
  display: flex; flex-wrap: wrap; gap: 8px 22px;
  font-size: 14.5px; color: var(--ink-700);
}
.hero-bullets li { display: inline-flex; align-items: center; gap: 8px; }
.hero-bullets svg { color: var(--primary); }

.hero-visual {
  position: relative;
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 14px;
  min-height: 480px;
}
.hero-photo {
  border-radius: var(--r-lg);
  overflow: hidden;
  box-shadow: var(--shadow-md);
}
.hero-photo-main { grid-row: 1 / 3; grid-column: 1; }
.hero-photo-sm { grid-row: 2; grid-column: 2; }
.hero-badge {
  position: absolute;
  top: 28px; right: -10px;
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 18px 22px;
  border-radius: var(--r-md);
  box-shadow: var(--shadow-md);
  display: flex; flex-direction: column; align-items: flex-start;
}
.hero-badge-num {
  font-family: 'Source Serif 4', Georgia, serif;
  font-size: 36px; line-height: 1; color: var(--secondary-ink); font-weight: 600;
}
.hero-badge-label { font-size: 12.5px; color: var(--ink-500); margin-top: 4px; line-height: 1.35; }

@media (max-width: 880px) {
  .hero-inner { grid-template-columns: 1fr; }
  .hero-visual { min-height: 360px; }
}

/* ---------- Image placeholders ---------- */
.img-ph {
  width: 100%; height: 100%; min-height: 140px;
  display: flex; align-items: flex-end; justify-content: flex-start;
  padding: 14px;
  position: relative;
}
.img-ph::after {
  content: "";
  position: absolute; inset: 0;
  border: 1px dashed rgba(28,26,35,0.18);
  border-radius: inherit;
  pointer-events: none;
}
.img-ph-caption {
  font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace;
  font-size: 11px; color: var(--ink-700);
  background: rgba(255,255,255,0.85);
  padding: 4px 8px; border-radius: 4px;
  letter-spacing: 0.02em;
}

/* ---------- Trust strip ---------- */
.trust { padding: 0 clamp(18px, 4vw, 40px); }
.trust-inner {
  max-width: var(--maxw); margin: 0 auto;
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 0;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 22px clamp(8px, 2vw, 16px);
  box-shadow: var(--shadow-sm);
}
.trust-item { text-align: center; padding: 8px 14px; border-right: 1px solid var(--line); }
.trust-item:last-child { border-right: 0; }
.trust-num { font-family: 'Source Serif 4', Georgia, serif; font-size: 32px; color: var(--secondary-ink); font-weight: 600; line-height: 1; }
.trust-label { font-size: 13px; color: var(--ink-500); margin-top: 6px; line-height: 1.35; }
@media (max-width: 720px) {
  .trust-inner { grid-template-columns: repeat(2, 1fr); }
  .trust-item { border-right: 0; border-bottom: 1px solid var(--line); padding: 14px; }
  .trust-item:nth-last-child(-n+2) { border-bottom: 0; }
}

/* ---------- Section heads ---------- */
.section-head { max-width: 760px; margin: 0 auto clamp(28px, 4vw, 48px); text-align: center; padding: 0 16px; }
.section-head-left { text-align: left; margin-left: 0; }
.kicker {
  display: inline-block;
  font-size: 12.5px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--primary-ink);
  margin-bottom: 14px;
}
.kicker-light { color: var(--green-100); }
.section-head h2 { margin-bottom: 14px; }
.section-lede { color: var(--ink-700); font-size: 17px; max-width: 60ch; margin: 0 auto; line-height: 1.55; }
.section-head-left .section-lede { margin: 0; }

/* ---------- Services ---------- */
.services { padding: clamp(56px, 8vw, 96px) clamp(18px, 4vw, 40px); }
.services-grid {
  max-width: var(--maxw); margin: 0 auto;
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px;
}
.service-card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 24px 22px;
  transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.service-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: rgba(146,42,130,0.18); }
.service-icon { width: 48px; height: 48px; margin-bottom: 16px; }
.service-icon svg { width: 100%; height: 100%; }
.service-card h3 { margin-bottom: 8px; }
.service-card p { font-size: 14.5px; color: var(--ink-700); line-height: 1.5; }
.service-meta { margin-top: 14px; }
.chip {
  display: inline-block;
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 999px;
  background: var(--green-50);
  color: var(--primary-ink);
  font-weight: 600;
}
@media (max-width: 1080px) { .services-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 560px)  { .services-grid { grid-template-columns: 1fr; } }

/* ---------- Approach ---------- */
.approach {
  padding: clamp(56px, 8vw, 96px) clamp(18px, 4vw, 40px);
  background: var(--purple-50);
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.approach-grid {
  max-width: var(--maxw); margin: 0 auto;
  display: grid; grid-template-columns: 1fr 1.3fr; gap: clamp(32px, 6vw, 72px);
  align-items: start;
}
.approach-intro h2 { margin: 12px 0 16px; }
.approach-intro p { color: var(--ink-700); font-size: 17px; margin-bottom: 24px; }
.steps { list-style: none; padding: 0; margin: 0; display: grid; gap: 16px; }
.steps li {
  display: grid; grid-template-columns: 56px 1fr; gap: 18px; align-items: start;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 22px 24px;
}
.step-num {
  font-family: 'Source Serif 4', Georgia, serif;
  font-size: 28px; line-height: 1;
  color: var(--secondary);
  font-weight: 600;
}
.steps h3 { margin-bottom: 6px; }
.steps p  { color: var(--ink-700); font-size: 14.5px; line-height: 1.5; }
@media (max-width: 880px) {
  .approach-grid { grid-template-columns: 1fr; }
}

/* ---------- Who we help ---------- */
.who { padding: clamp(56px, 8vw, 96px) clamp(18px, 4vw, 40px); max-width: var(--maxw); margin: 0 auto; }
.who-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
.who-card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 24px 22px;
}
.who-card h3 { margin-bottom: 14px; color: var(--secondary-ink); font-size: 18px; }
.who-card ul { list-style: none; padding: 0; margin: 0; display: grid; gap: 8px; }
.who-card li {
  display: flex; align-items: center; gap: 10px;
  font-size: 14.5px; color: var(--ink-700);
}
.who-card li svg { color: var(--primary); flex-shrink: 0; }
@media (max-width: 1080px) { .who-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 560px)  { .who-grid { grid-template-columns: 1fr; } }

/* ---------- Locations ---------- */
.locations { padding: clamp(56px, 8vw, 96px) clamp(18px, 4vw, 40px); background: var(--paper); border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
.loc-grid {
  max-width: var(--maxw); margin: 0 auto;
  display: grid; grid-template-columns: 1fr 1fr; gap: 22px;
}
.loc-card {
  display: grid; grid-template-columns: 280px 1fr;
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  overflow: hidden;
  background: var(--bg);
}
.loc-map {
  position: relative;
  background: #eee;
  aspect-ratio: 1 / 1;
  align-self: start;
  width: 280px;
}
.loc-map iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
.loc-body { padding: 22px 24px; }
.loc-body h3 { margin-bottom: 8px; color: var(--secondary-ink); }
.addr { color: var(--ink-700); font-size: 15px; margin-bottom: 14px; line-height: 1.4; }
.loc-meta { list-style: none; padding: 0; margin: 0; display: grid; gap: 8px; font-size: 14px; color: var(--ink-700); }
.loc-meta li { display: flex; align-items: center; gap: 8px; }
.loc-meta svg { color: var(--primary); flex-shrink: 0; }
@media (max-width: 880px) { .loc-grid { grid-template-columns: 1fr; } .loc-card { grid-template-columns: 1fr; } .loc-photo { min-height: 160px; } }

/* ---------- FAQ ---------- */
.faq { padding: clamp(56px, 8vw, 96px) clamp(18px, 4vw, 40px); max-width: 880px; margin: 0 auto; }
.faq-list { list-style: none; padding: 0; margin: 0; display: grid; gap: 8px; }
.faq-list li { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-md); overflow: hidden; }
.faq-list button {
  width: 100%; display: flex; align-items: center; justify-content: space-between;
  padding: 18px 22px;
  background: transparent; border: 0; cursor: pointer;
  font-family: inherit; font-size: 16.5px; font-weight: 600; text-align: left;
  color: var(--ink-900);
}
.faq-toggle { font-size: 22px; color: var(--secondary); font-weight: 400; line-height: 1; }
.faq-answer { max-height: 0; overflow: hidden; transition: max-height .25s ease; padding: 0 22px; }
.faq-list li.open .faq-answer { max-height: 200px; padding-bottom: 18px; }
.faq-answer p { color: var(--ink-700); font-size: 15px; line-height: 1.55; }

/* ---------- Refer CTA ---------- */
.refer {
  padding: clamp(56px, 8vw, 96px) clamp(18px, 4vw, 40px);
  background: linear-gradient(135deg, #0f7a09 0%, #19A610 55%, #2bb721 100%);
  color: #fff;
  position: relative; overflow: hidden;
}
.refer::before {
  content: "";
  position: absolute; inset: 0;
  background:
    radial-gradient(40% 60% at 90% 0%, rgba(146,42,130,0.45), transparent 60%),
    radial-gradient(50% 70% at 0% 100%, rgba(255,255,255,0.10), transparent 60%);
  pointer-events: none;
}
.refer-inner {
  position: relative;
  max-width: var(--maxw); margin: 0 auto;
  display: grid; grid-template-columns: 1fr 1fr; gap: clamp(32px, 6vw, 72px);
  align-items: start;
}
.refer-copy h2 { color: #fff; margin: 12px 0 16px; }
.refer-copy p { color: rgba(255,255,255,0.92); font-size: 17px; max-width: 50ch; line-height: 1.55; }
.refer-bullets { list-style: none; padding: 0; margin: 22px 0 28px; display: grid; gap: 10px; font-size: 15px; }
.refer-bullets li { display: flex; align-items: center; gap: 10px; color: rgba(255,255,255,0.95); }
.refer-bullets svg { color: #fff; }
.refer-or { font-size: 13px; opacity: 0.85; text-transform: uppercase; letter-spacing: 0.12em; font-weight: 700; margin-bottom: 12px; }
.refer-contacts { display: grid; gap: 10px; }
.contact-line { display: flex; align-items: center; gap: 14px; padding: 12px 14px; border-radius: var(--r-md); background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.18); transition: background .15s; }
.contact-line:hover { background: rgba(255,255,255,0.16); }
.contact-line svg { flex-shrink: 0; }
.contact-line span { display: flex; flex-direction: column; }
.contact-line strong { font-size: 16px; }
.contact-line em { font-style: normal; font-size: 12.5px; opacity: 0.8; }

/* Form */
.refer-form {
  background: var(--paper);
  border-radius: var(--r-lg);
  padding: 28px clamp(20px, 3vw, 32px);
  color: var(--ink-900);
  box-shadow: var(--shadow-lg);
  border: 1px solid rgba(255,255,255,0.4);
}
.form-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.form-head h3 { font-size: 22px; }
.form-time { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--ink-500); background: var(--green-50); padding: 4px 10px; border-radius: 999px; }
.form-time svg { color: var(--primary); }

.field { margin-bottom: 16px; }
.field label { display: block; font-size: 13.5px; font-weight: 600; color: var(--ink-700); margin-bottom: 8px; }
.field .hint { font-weight: 500; color: var(--ink-500); }
.field input, .field textarea {
  width: 100%; padding: 12px 14px;
  border: 1.5px solid var(--ink-100);
  border-radius: var(--r-sm);
  font-size: 15px; font-family: inherit; color: var(--ink-900);
  background: var(--bg);
  transition: border-color .15s, background .15s;
  resize: vertical;
}
.field input:focus, .field textarea:focus {
  outline: none;
  border-color: var(--primary);
  background: #fff;
}
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field-row .field-sm { max-width: 100px; }
.field-row .field-sm + .field { margin-bottom: 16px; }

.seg { display: flex; gap: 0; border: 1.5px solid var(--ink-100); border-radius: var(--r-sm); padding: 3px; background: var(--bg); }
.seg button { flex: 1; padding: 9px 12px; background: transparent; border: 0; border-radius: 6px; font-size: 13.5px; font-weight: 600; color: var(--ink-500); cursor: pointer; font-family: inherit; transition: background .15s, color .15s; }
.seg button.on { background: var(--primary); color: #fff; box-shadow: 0 1px 3px rgba(25,166,16,0.25); }
.seg-wrap { flex-wrap: wrap; gap: 4px; padding: 4px; }
.seg-wrap button { flex: 1 0 auto; }

.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip-pick {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 8px 12px;
  border: 1.5px solid var(--ink-100);
  background: var(--bg);
  border-radius: 999px;
  font-size: 13.5px; font-weight: 500;
  color: var(--ink-700);
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
}
.chip-pick:hover { border-color: var(--secondary); }
.chip-pick.on { background: var(--purple-50); border-color: var(--secondary); color: var(--secondary-ink); font-weight: 600; }
.chip-tick { color: var(--secondary); font-weight: 700; }

.form-fineprint { font-size: 12.5px; color: var(--ink-500); margin-top: 14px; line-height: 1.5; text-align: center; }

.form-done { text-align: center; padding: 32px 8px; }
.form-done-tick {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: var(--green-50);
  color: var(--primary);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 18px;
}
.form-done h3 { font-size: 24px; margin-bottom: 10px; }
.form-done p { color: var(--ink-700); margin-bottom: 22px; }
.form-done a { color: var(--primary-ink); font-weight: 600; }

@media (max-width: 880px) {
  .refer-inner { grid-template-columns: 1fr; }
}

/* ---------- Footer ---------- */
.footer { background: var(--ink-900); color: rgba(255,255,255,0.85); padding: clamp(48px, 6vw, 72px) clamp(18px, 4vw, 40px) 32px; }
.footer-inner {
  max-width: var(--maxw); margin: 0 auto;
  display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 40px;
}
.footer-brand img { height: 56px; width: auto; background: #fff; padding: 8px; border-radius: var(--r-sm); margin-bottom: 16px; }
.footer-brand p { font-size: 14px; color: rgba(255,255,255,0.65); line-height: 1.6; max-width: 38ch; }
.footer-col h4 { color: #fff; font-family: inherit; font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 14px; }
.footer-col a { display: block; padding: 4px 0; font-size: 14px; color: rgba(255,255,255,0.7); transition: color .15s; }
.footer-col a:hover { color: #fff; }
.footer-col p { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 12px; line-height: 1.5; }
.footer-col p strong { color: #fff; font-weight: 600; }
.socials { display: flex; gap: 10px; margin-top: 16px; }
.socials a { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.08); display: inline-flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.85); padding: 0; }
.socials a:hover { background: var(--primary); color: #fff; }

.acknowledgement {
  max-width: var(--maxw); margin: 40px auto 0;
  padding-top: 24px;
  border-top: 1px solid rgba(255,255,255,0.10);
}
.acknowledgement p { font-size: 13px; color: rgba(255,255,255,0.55); line-height: 1.6; max-width: 60ch; }

.footer-bottom {
  max-width: var(--maxw); margin: 24px auto 0;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.08);
  display: flex; justify-content: space-between; align-items: center;
  font-size: 12.5px; color: rgba(255,255,255,0.50);
  flex-wrap: wrap; gap: 12px;
}
.footer-bottom-links { display: flex; gap: 16px; }
.footer-bottom-links a { color: inherit; }
.footer-bottom-links a:hover { color: #fff; }

@media (max-width: 880px) {
  .footer-inner { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 560px) {
  .footer-inner { grid-template-columns: 1fr; }
}
